name: Slack Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: Slack-windows-amd64.exe
          - id: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: Slack-linux-amd64
          - id: macos-amd64
            os: macos-14
            goos: darwin
            goarch: amd64
            artifact_name: Slack-macos-amd64
          - id: macos-arm64
            os: macos-14
            goos: darwin
            goarch: arm64
            artifact_name: Slack-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"

      - name: Install Linux Dependencies
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libpcap-dev libwebkit2gtk-4.1-dev pkg-config
          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx

      - name: Install Windows Dependencies
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          choco install -y upx

      - name: Install create-dmg
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          brew install create-dmg

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build App
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          if [ "${{ matrix.goos }}" = "linux" ]; then
            wails build -tags webkit2_41 -platform ${{ matrix.goos }}/${{ matrix.goarch }}
          else
            wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }}
          fi

      - name: Prepare Windows Release Files
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          mkdir -p release
          upx -f build/bin/Slack.exe
          cp build/bin/Slack.exe "release/${{ matrix.artifact_name }}"

      - name: Prepare Linux Release Files
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          mkdir -p release
          upx -f build/bin/Slack
          cp build/bin/Slack "release/${{ matrix.artifact_name }}"

      - name: Prepare macOS Release Files
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          mkdir -p release
          mv build/bin/Slack.app "release/${{ matrix.artifact_name }}.app"
          chmod +x "release/${{ matrix.artifact_name }}.app/Contents/MacOS/Slack"
          xattr -c "release/${{ matrix.artifact_name }}.app"
          ditto -c -k --sequesterRsrc --keepParent "release/${{ matrix.artifact_name }}.app" "release/${{ matrix.artifact_name }}.zip"
          create-dmg \
            --volname "Slack" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "${{ matrix.artifact_name }}.app" 200 190 \
            --app-drop-link 600 185 \
            --hide-extension "${{ matrix.artifact_name }}.app" \
            --volicon "release/${{ matrix.artifact_name }}.app/Contents/Resources/iconfile.icns" \
            "release/${{ matrix.artifact_name }}.dmg" \
            "release/${{ matrix.artifact_name }}.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: release/*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List Release Files
        shell: bash
        run: |
          ls -la release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
